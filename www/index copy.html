<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: https://ssl.gstatic.com 'unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content:;">
        <meta name="format-detection" content="telephone=no">
        <meta name="msapplication-tap-highlight" content="no">
        <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
        <meta name="color-scheme" content="light dark">
        <link rel="stylesheet" href="css/index.css">
        <title>Connexion</title>
    </head>
    <body>
        <div class="login-container">
            <!-- Logo -->
            <div class="logo">
                <img src="img/meme_soldier_stare.png" alt="Logo" id="logoImg">
            </div>

            <div class="button-group">
                <button type="button" class="btn btn-take" id="takeBtn">
                    Take
                </button>
                <button type="button" class="btn btn-load" id="loadBtn">
                    Load
                </button>
            </div>
            
            <!-- Titre -->
            <h1>Connexion</h1>
            
            <!-- Formulaire -->
            <form id="loginForm">
                <div class="input-group">
                    <label for="login">Identifiant</label>
                    <input type="text" id="login" name="login" placeholder="Votre identifiant" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" placeholder="Votre mot de passe" required>
                </div>
                
                <div class="button-group">
                    <button type="button" class="btn btn-secondary" id="clearBtn">
                        Effacer
                    </button>
                    <button type="button" class="btn btn-primary" id="validateBtn">
                        Valider
                    </button>
                    <button type="button" class="btn btn-connect" id="connectBtn">
                        Connexion
                    </button>
                </div>
            </form>
            
            <!-- Informations du périphérique -->
            <div class="device-info">
                <h3>Informations du périphérique</h3>
                <div id="deviceInfo">
                    En attente des informations...
                </div>
            </div>

            <div class="network-connection">
                <h3>Informations sur la connection</h3>
                <div id="netInfo">
                    En attente des informations...
                </div>
            </div>

            <!-- Géolocalisation -->
            <div class="geolocation-info">
                <h3>Géolocalisation</h3>
                <button type="button" class="btn btn-primary" id="getPositionBtn">
                    Obtenir Position GPS
                </button>
                <div id="geoInfo">
                    En attente des informations...
                </div>
            </div>
        </div>

        <!-- Script Cordova -->
        <script src="cordova.js"></script>
        <script src="js/index.js"></script>
    </body>
</html>
