<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' data: https://ssl.gstatic.com https://api.openai.com 'unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content:;"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta
      name="viewport"
      content="initial-scale=1, width=device-width, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#f5f6fa" />
    <link rel="stylesheet" href="css/index.css" />
    <title>Frigo Chef AI</title>
  </head>
  <body>
    <header>
      <div class="header-content">
        <h1>👨‍🍳 Frigo Chef</h1>
        <p>Cuisinez avec ce que vous avez</p>
      </div>
    </header>

    <main id="main-container" class="app-container">
      <!-- Vue Accueil -->
      <div id="view-home" class="view-section active" role="tabpanel" aria-labelledby="nav-home">
        <section class="scan-section" aria-label="Photo du frigo">
          <div id="imagePreview" class="image-wrapper empty">
            <div class="placeholder-content">
              <span class="icon" aria-hidden="true">📸</span>
              <p>Montrez-moi votre frigo</p>
            </div>
          </div>

          <div class="floating-actions">
            <button
              type="button"
              class="fab-btn secondary"
              id="selectPictureBtn"
              aria-label="Choisir une photo de la galerie"
            >
              🖼️
            </button>
            <button
              type="button"
              class="fab-btn primary"
              id="takePictureBtn"
              aria-label="Prendre une photo"
            >
              📷
            </button>
            <button
              type="button"
              class="fab-btn delete"
              id="clearPictureBtn"
              style="display: none"
              aria-label="Supprimer la photo"
            >
              ✕
            </button>
          </div>
        </section>

        <section class="input-section" aria-label="Description des ingrédients">
          <div class="input-group">
            <label for="question" class="visually-hidden">Ingrédients supplémentaires</label>
            <textarea
              id="question"
              rows="1"
              placeholder="Ex: J'ai aussi des pâtes..."
              autocomplete="off"
              autocorrect="on"
            ></textarea>
            <button id="sendBtn" class="generate-btn" type="button">
              <span class="btn-text">Trouver des recettes</span>
              <span class="btn-icon" aria-hidden="true">✨</span>
            </button>
          </div>
        </section>

        <section id="responseArea" class="results-container" aria-live="polite" aria-label="Résultats"></section>
      </div>

      <!-- Vue Favoris -->
      <div id="view-favorites" class="view-section" role="tabpanel" aria-labelledby="nav-favorites">
        <div class="view-header">
          <h2>❤️ Mes Favoris</h2>
        </div>
        <div id="favorites-content" class="view-content"></div>
      </div>

      <!-- Vue Liste de courses -->
      <div id="view-shopping" class="view-section" role="tabpanel" aria-labelledby="nav-shopping">
        <div class="view-header">
          <h2>🛒 Liste de courses</h2>
        </div>
        <div id="shopping-content" class="view-content"></div>
      </div>

      <!-- Vue Historique -->
      <div id="view-history" class="view-section" role="tabpanel" aria-labelledby="nav-history">
        <div class="view-header">
          <h2>📋 Historique</h2>
        </div>
        <div id="history-content" class="view-content"></div>
      </div>

      <!-- Vue Paramètres -->
      <div id="view-settings" class="view-section" role="tabpanel" aria-labelledby="nav-settings">
        <div class="view-header">
          <h2>⚙️ Réglages</h2>
        </div>
        <div id="settings-content" class="view-content"></div>
      </div>
    </main>

    <nav class="bottom-navbar" role="tablist" aria-label="Navigation principale">
      <button
        class="nav-item active"
        data-target="view-home"
        id="nav-home"
        role="tab"
        aria-selected="true"
        aria-controls="view-home"
      >
        <span class="nav-icon" aria-hidden="true">🏠</span>
        <span class="nav-label">Cuisiner</span>
      </button>
      <button
        class="nav-item"
        data-target="view-favorites"
        id="nav-favorites"
        role="tab"
        aria-selected="false"
        aria-controls="view-favorites"
      >
        <span class="nav-icon" aria-hidden="true">❤️</span>
        <span class="nav-label">Favoris</span>
      </button>
      <button
        class="nav-item"
        data-target="view-shopping"
        id="nav-shopping"
        role="tab"
        aria-selected="false"
        aria-controls="view-shopping"
      >
        <span class="nav-icon" aria-hidden="true">🛒</span>
        <span class="nav-label">Courses</span>
      </button>
      <button
        class="nav-item"
        data-target="view-history"
        id="nav-history"
        role="tab"
        aria-selected="false"
        aria-controls="view-history"
      >
        <span class="nav-icon" aria-hidden="true">📋</span>
        <span class="nav-label">Historique</span>
      </button>
      <button
        class="nav-item"
        data-target="view-settings"
        id="nav-settings"
        role="tab"
        aria-selected="false"
        aria-controls="view-settings"
      >
        <span class="nav-icon" aria-hidden="true">⚙️</span>
        <span class="nav-label">Réglages</span>
      </button>
    </nav>

    <script src="cordova.js"></script>
    <script src="js/index.js"></script>

    <style>
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </body>
</html>
